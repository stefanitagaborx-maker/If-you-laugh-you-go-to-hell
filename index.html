<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: #000; z-index: 100; }
        #overlay img { width: 100%; height: auto; }
        #btn { position: fixed; bottom: 50px; width: 70%; padding: 20px; border-radius: 50px; border: none; background: #007aff; color: #fff; font-weight: bold; font-size: 18px; z-index: 200; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="overlay">
    <img id="cursed-img" src="" alt="">
</div>

<button id="btn">NEXT PHOTO</button>

<script>
    const btn = document.getElementById('btn');
    const overlay = document.getElementById('overlay');
    const cursedImg = document.getElementById('cursed-img');

    // Consolidated to 8 images since Water and Ham are the same
    const scenarios = [
        { img: "eating.png" },
        { img: "pasta.png" },
        { img: "ramen.png" },
        { img: "water_ham.png" },
        { img: "noodles.png" },
        { img: "good.png" },
        { img: "idontcare.png" },
        { img: "bacon.png" }
    ];

    let step = 0;

    btn.addEventListener('click', () => {
        if (step >= scenarios.length) {
            location.reload();
            return;
        }

        cursedImg.src = scenarios[step].img;
        overlay.style.display = 'flex';
        btn.style.display = 'none';

        setTimeout(() => { 
            overlay.style.display = 'none'; 
            btn.style.display = 'block';
            step++;
            if (step === scenarios.length) btn.innerText = "RESTART";
        }, 7555);
    });
</script>
</body>
</html>
